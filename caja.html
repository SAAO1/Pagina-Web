<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NaturalSex — Punto de Venta</title>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, onSnapshot, doc, updateDoc, addDoc, getDoc, serverTimestamp, increment }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBQJBD0SoUPfxXtR-mwQMytnBcTCddAMOQ",
    authDomain: "naturalsex-store.firebaseapp.com",
    projectId: "naturalsex-store",
    storageBucket: "naturalsex-store.firebasestorage.app",
    messagingSenderId: "755686910675",
    appId: "1:755686910675:web:e268a788ef6c42a28c8226"
  };

  const app  = initializeApp(firebaseConfig);
  const db   = getFirestore(app);
  const auth = getAuth(app);

  window._db   = db;
  window._auth = auth;
  window._fb   = { collection, onSnapshot, doc, updateDoc, addDoc, getDoc, serverTimestamp, increment };
  window._signIn  = (e,p) => signInWithEmailAndPassword(auth,e,p);
  window._signOut = () => signOut(auth);

  onAuthStateChanged(auth, user => {
    window._cajaUser = user;
    if(user){
      document.getElementById('loginScreen').style.display='none';
      document.getElementById('posScreen').style.display='flex';
      document.getElementById('empName').textContent = user.email.split('@')[0];
      loadProducts();
    } else {
      document.getElementById('loginScreen').style.display='flex';
      document.getElementById('posScreen').style.display='none';
    }
  });
</script>

<style>
:root{
  --vino:#6B1A2A;--vino-d:#3d0a14;--gold:#C9A96E;
  --white:#fff;--off:#FAF8F5;--gray:#888;--lgray:#f0eded;
  --text:#1a1a1a;--border:#e5e0db;--ok:#2ecc71;--err:#e74c3c;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Jost',sans-serif;background:#f0ece8;color:var(--text)}
button{font-family:'Jost',sans-serif;cursor:pointer;border:none;outline:none}
input,select{font-family:'Jost',sans-serif;outline:none}

/* LOGIN */
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--vino-d),var(--vino))}
.login-card{background:#fff;border-radius:14px;padding:44px 40px;width:100%;max-width:380px;
  box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{font-family:'Jost',sans-serif;font-size:22px;font-weight:700;color:var(--vino);
  text-align:center;margin-bottom:4px;letter-spacing:1px}
.login-logo em{color:var(--gold);font-style:normal}
.login-sub{text-align:center;font-size:11px;color:var(--gray);letter-spacing:2px;
  text-transform:uppercase;margin-bottom:28px}
.fin{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:6px;
  font-size:14px;color:var(--text);margin-bottom:12px;transition:border-color .2s}
.fin:focus{border-color:var(--vino)}
.login-btn{width:100%;background:var(--vino);color:#fff;padding:13px;font-size:13px;
  font-weight:600;letter-spacing:1px;border-radius:6px;transition:background .2s}
.login-btn:hover{background:var(--vino-d)}
.login-err{background:rgba(231,76,60,.1);color:#a01020;border:1px solid rgba(231,76,60,.3);
  padding:9px 13px;border-radius:5px;font-size:12.5px;margin-bottom:12px;display:none}
.login-err.show{display:block}

/* POS LAYOUT */
#posScreen{display:none;height:100vh;flex-direction:column}
.pos-header{background:var(--vino-d);color:#fff;padding:0 24px;height:54px;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.pos-logo{font-size:17px;font-weight:700;letter-spacing:1px}
.pos-logo em{color:var(--gold);font-style:normal}
.pos-emp{display:flex;align-items:center;gap:14px;font-size:13px;color:rgba(255,255,255,.7)}
.pos-emp strong{color:#fff}
.logout-btn{background:rgba(255,255,255,.1);color:rgba(255,255,255,.8);padding:6px 14px;
  border-radius:4px;font-size:12px;transition:background .2s}
.logout-btn:hover{background:rgba(255,255,255,.2)}

.pos-body{display:flex;flex:1;overflow:hidden}

/* PRODUCTS PANEL */
.prod-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--border)}
.search-bar{padding:14px 16px;background:#fff;border-bottom:1px solid var(--border);display:flex;gap:10px}
.search-in{flex:1;padding:9px 14px;border:1.5px solid var(--border);border-radius:6px;font-size:14px}
.search-in:focus{border-color:var(--vino)}
.cat-filter{padding:8px 14px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;
  background:#fff;color:var(--text);cursor:pointer}
.cat-filter:focus{border-color:var(--vino)}

.prod-list{flex:1;overflow-y:auto;padding:10px}
.prod-row{display:flex;align-items:center;padding:10px 12px;background:#fff;border-radius:7px;
  margin-bottom:6px;cursor:pointer;transition:all .15s;border:1.5px solid transparent;
  gap:12px}
.prod-row:hover{border-color:var(--vino);background:#fff9f9}
.prod-row.zero{opacity:.45;cursor:not-allowed}
.pr-name{flex:1;font-size:13.5px;font-weight:500;line-height:1.3}
.pr-cat{font-size:10.5px;color:var(--gold);font-weight:600;text-transform:uppercase;
  letter-spacing:.5px;margin-bottom:2px}
.pr-price{font-size:14px;font-weight:700;color:var(--vino);white-space:nowrap}
.pr-stock{font-size:11px;color:var(--gray);white-space:nowrap;text-align:right}
.pr-stock.low{color:#e67e22;font-weight:600}
.pr-stock.out{color:var(--err);font-weight:600}
.add-btn{width:32px;height:32px;background:var(--vino);color:#fff;border-radius:6px;
  display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;
  transition:background .15s}
.add-btn:hover{background:var(--vino-d)}
.prod-row.zero .add-btn{background:var(--gray);cursor:not-allowed}

.no-results{text-align:center;padding:50px 20px;color:var(--gray)}
.no-results i{font-size:36px;color:var(--lgray);display:block;margin-bottom:12px}

/* CART PANEL */
.cart-panel{width:380px;display:flex;flex-direction:column;background:#fff;flex-shrink:0}
.cart-header{padding:16px 18px;border-bottom:1px solid var(--lgray);
  display:flex;justify-content:space-between;align-items:center}
.cart-title{font-size:16px;font-weight:700;color:var(--vino)}
.cart-count{background:var(--vino);color:#fff;border-radius:20px;
  padding:2px 10px;font-size:12px;font-weight:600}
.cart-items{flex:1;overflow-y:auto;padding:10px 14px}
.cart-empty{text-align:center;padding:50px 20px;color:var(--gray)}
.cart-empty i{font-size:40px;color:var(--lgray);display:block;margin-bottom:12px}

.ci{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--lgray)}
.ci-name{flex:1;font-size:13px;font-weight:500;line-height:1.3}
.ci-price{font-size:13px;color:var(--vino);font-weight:600;white-space:nowrap}
.ci-qty{display:flex;align-items:center;gap:5px}
.qb{width:24px;height:24px;border:1.5px solid var(--border);background:#fff;
  border-radius:4px;font-size:12px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;transition:all .15s;font-weight:700}
.qb:hover{background:var(--vino);color:#fff;border-color:var(--vino)}
.ci-del{background:none;border:none;color:var(--gray);cursor:pointer;font-size:12px;
  transition:color .15s;padding:2px}
.ci-del:hover{color:var(--err)}

.cart-footer{padding:14px 18px;border-top:1.5px solid var(--border)}
.total-row{display:flex;justify-content:space-between;margin-bottom:5px;font-size:13px;color:var(--gray)}
.total-final{display:flex;justify-content:space-between;font-size:20px;font-weight:800;
  color:var(--vino);padding:10px 0;border-top:2px solid var(--border);border-bottom:2px solid var(--border);
  margin:8px 0 14px}

.sell-btn{width:100%;background:var(--ok);color:#fff;padding:15px;font-size:14px;
  font-weight:700;letter-spacing:.5px;border-radius:8px;transition:background .2s;
  display:flex;align-items:center;justify-content:center;gap:9px}
.sell-btn:hover{background:#27ae60}
.sell-btn:disabled{background:var(--gray);cursor:not-allowed}
.clear-btn{width:100%;background:none;border:1.5px solid var(--border);color:var(--gray);
  padding:9px;font-size:12.5px;font-weight:500;border-radius:6px;margin-top:8px;transition:all .2s}
.clear-btn:hover{border-color:var(--err);color:var(--err)}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--vino-d);color:#fff;
  padding:12px 18px;border-radius:7px;font-size:13px;display:flex;align-items:center;
  gap:8px;z-index:3000;transform:translateY(14px);opacity:0;transition:all .3s;
  pointer-events:none;box-shadow:0 8px 28px rgba(0,0,0,.25)}
.toast.show{transform:translateY(0);opacity:1}
.toast i{color:var(--gold)}

/* SUCCESS OVERLAY */
.success-ov{position:fixed;inset:0;background:rgba(26,10,16,.85);z-index:5000;
  display:none;align-items:center;justify-content:center}
.success-ov.show{display:flex;animation:fdIn .25s ease}
@keyframes fdIn{from{opacity:0}to{opacity:1}}
.success-card{background:#fff;border-radius:14px;padding:40px 44px;text-align:center;
  max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.success-ico{width:80px;height:80px;background:rgba(46,204,113,.12);border-radius:50%;
  display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:32px;color:var(--ok)}
.success-card h2{font-size:26px;font-weight:700;margin-bottom:6px;color:var(--text)}
.success-card .amount{font-size:32px;font-weight:800;color:var(--vino);margin:10px 0}
.success-card p{font-size:13px;color:var(--gray);margin-bottom:22px}
.ok-btn{background:var(--vino);color:#fff;padding:12px 40px;border-radius:6px;
  font-size:14px;font-weight:600;transition:background .2s}
.ok-btn:hover{background:var(--vino-d)}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:#f0ece8}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">Natural<em>Sex</em></div>
    <div class="login-sub">Punto de Venta — Empleados</div>
    <div class="login-err" id="loginErr">Usuario o contraseña incorrectos</div>
    <input class="fin" id="empEmail" type="email" placeholder="Correo del empleado"
      onkeydown="if(event.key==='Enter')doLogin()"/>
    <input class="fin" id="empPass" type="password" placeholder="Contraseña"
      onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="login-btn" onclick="doLogin()">
      <i class="fas fa-sign-in-alt" style="margin-right:7px"></i>Ingresar
    </button>
  </div>
</div>

<!-- POS -->
<div id="posScreen">
  <header class="pos-header">
    <div class="pos-logo">Natural<em>Sex</em> &nbsp;·&nbsp; <span style="font-size:13px;font-weight:400;color:rgba(255,255,255,.6)">Punto de Venta</span></div>
    <div class="pos-emp">
      <i class="fas fa-user-circle" style="font-size:18px;color:var(--gold)"></i>
      <span>Empleado: <strong id="empName">—</strong></span>
      <button class="logout-btn" onclick="doLogout()"><i class="fas fa-sign-out-alt" style="margin-right:5px"></i>Salir</button>
    </div>
  </header>

  <div class="pos-body">
    <!-- Productos -->
    <div class="prod-panel">
      <div class="search-bar">
        <input class="search-in" id="searchIn" placeholder="🔍 Buscar producto por nombre..." oninput="filterProds()"/>
        <select class="cat-filter" id="catFilter" onchange="filterProds()">
          <option value="">Todas las categorías</option>
        </select>
      </div>
      <div class="prod-list" id="prodList">
        <div class="no-results">
          <i class="fas fa-spinner fa-spin" style="color:var(--vino)"></i>
          <p>Cargando productos...</p>
        </div>
      </div>
    </div>

    <!-- Carrito / Venta -->
    <div class="cart-panel">
      <div class="cart-header">
        <div class="cart-title"><i class="fas fa-shopping-bag" style="margin-right:7px"></i>Venta Actual</div>
        <span class="cart-count" id="cartCount">0</span>
      </div>
      <div class="cart-items" id="cartItems">
        <div class="cart-empty">
          <i class="fas fa-shopping-bag"></i>
          <p style="font-size:14px;font-weight:500;margin-bottom:4px">Carrito vacío</p>
          <p style="font-size:12px">Haz clic en un producto para agregarlo</p>
        </div>
      </div>
      <div class="cart-footer">
        <div class="total-row"><span>Subtotal</span><span id="subtotal">$0</span></div>
        <div class="total-final">
          <span>TOTAL</span>
          <span id="totalFinal">$0</span>
        </div>
        <button class="sell-btn" id="sellBtn" onclick="processSale()">
          <i class="fas fa-cash-register"></i> REGISTRAR VENTA
        </button>
        <button class="clear-btn" onclick="clearCart()">
          <i class="fas fa-trash" style="margin-right:5px"></i>Limpiar carrito
        </button>
      </div>
    </div>
  </div>
</div>

<!-- SUCCESS -->
<div class="success-ov" id="successOv">
  <div class="success-card">
    <div class="success-ico"><i class="fas fa-check"></i></div>
    <h2>¡Venta Registrada!</h2>
    <div class="amount" id="saleAmount">$0</div>
    <p id="saleItems">—</p>
    <button class="ok-btn" onclick="closeSuccess()">
      <i class="fas fa-arrow-right" style="margin-right:7px"></i>Nueva Venta
    </button>
  </div>
</div>

<div class="toast" id="toast"><i class="fas fa-check-circle"></i><span id="toastTxt">Listo</span></div>

<script>
// ══════════════════════════════
// STATE
// ══════════════════════════════
let allProds = [];
let cart     = [];
let drawerPort = null; // Web Serial puerto de la caja

// ══════════════════════════════
// LOGIN
// ══════════════════════════════
async function doLogin(){
  const email = document.getElementById('empEmail').value.trim();
  const pass  = document.getElementById('empPass').value;
  const errEl = document.getElementById('loginErr');
  if(!email||!pass){ errEl.classList.add('show'); errEl.textContent='Completa todos los campos'; return; }
  errEl.classList.remove('show');
  try {
    await window._signIn(email, pass);
  } catch(e){
    errEl.classList.add('show');
    errEl.textContent = 'Usuario o contraseña incorrectos';
  }
}

function doLogout(){
  if(!confirm('¿Salir del punto de venta?')) return;
  window._signOut();
}

// ══════════════════════════════
// CARGAR PRODUCTOS
// ══════════════════════════════
function loadProducts(){
  if(!window._db){ toast('❌ Sin conexión a Firebase'); return; }
  const {collection, onSnapshot} = window._fb;
  onSnapshot(collection(window._db,'products'), snap => {
    allProds = snap.docs.map(d=>({id:d.id,...d.data()})).filter(p=>p.name&&p.price);
    allProds.sort((a,b)=>a.name.localeCompare(b.name));
    renderProds(allProds);
    buildCatFilter();
  }, err => toast('Error cargando productos'));
}

function buildCatFilter(){
  const sel = document.getElementById('catFilter');
  const cur = sel.value;
  const cats = [...new Set(allProds.map(p=>p.cat).filter(Boolean))].sort();
  sel.innerHTML = '<option value="">Todas las categorías</option>' +
    cats.map(c=>`<option value="${c}">${c}</option>`).join('');
  if(cur) sel.value = cur;
}

function filterProds(){
  const q   = document.getElementById('searchIn').value.toLowerCase().trim();
  const cat = document.getElementById('catFilter').value;
  let list  = allProds;
  if(cat) list = list.filter(p=>p.cat===cat);
  if(q)   list = list.filter(p=>p.name.toLowerCase().includes(q)||(p.cat||'').toLowerCase().includes(q));
  renderProds(list);
}

function renderProds(list){
  const el = document.getElementById('prodList');
  if(!list.length){
    el.innerHTML=`<div class="no-results"><i class="fas fa-search"></i><p>Sin resultados</p></div>`;
    return;
  }
  el.innerHTML = list.map(p=>{
    const stock = p.stock||0;
    const out   = stock<=0;
    const low   = !out && stock<=5;
    const stockTxt = out?'Agotado': low?`¡Solo ${stock} uds!`:`${stock} en stock`;
    const stockCls = out?'out':low?'low':'';
    return `<div class="prod-row${out?' zero':''}" onclick="${out?'':'addToCart(\''+p.id+'\')'}" title="${out?'Sin stock':'Agregar al carrito'}">
      <div style="flex:1;min-width:0">
        <div class="pr-cat">${p.cat||''}</div>
        <div class="pr-name">${p.name}</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div class="pr-price">$${(p.price||0).toLocaleString('es-CO')}</div>
        <div class="pr-stock ${stockCls}">${stockTxt}</div>
      </div>
      <button class="add-btn" ${out?'disabled':''}><i class="fas fa-plus"></i></button>
    </div>`;
  }).join('');
}

// ══════════════════════════════
// CARRITO
// ══════════════════════════════
function addToCart(id){
  const p = allProds.find(x=>x.id===id); if(!p) return;
  const ex = cart.find(x=>x.id===id);
  const maxQty = p.stock||0;
  if(ex){
    if(ex.qty >= maxQty){ toast('⚠️ No hay más stock disponible'); return; }
    ex.qty++;
  } else {
    cart.push({id:p.id, name:p.name, price:p.price, qty:1, maxQty});
  }
  renderCart();
  toast(`"${p.name}" agregado ✓`);
}

function changeQty(id, delta){
  const it = cart.find(x=>x.id===id); if(!it) return;
  it.qty += delta;
  if(it.qty <= 0) cart = cart.filter(x=>x.id!==id);
  else if(it.qty > it.maxQty){ it.qty=it.maxQty; toast('⚠️ Máximo stock disponible'); }
  renderCart();
}

function removeFromCart(id){
  cart = cart.filter(x=>x.id!==id);
  renderCart();
}

function clearCart(){
  if(cart.length && !confirm('¿Limpiar el carrito?')) return;
  cart=[];
  renderCart();
}

function getTotal(){ return cart.reduce((s,x)=>s+x.price*x.qty,0); }

function renderCart(){
  const count = cart.reduce((s,x)=>s+x.qty,0);
  const total = getTotal();
  document.getElementById('cartCount').textContent = count;
  document.getElementById('subtotal').textContent = '$'+total.toLocaleString('es-CO');
  document.getElementById('totalFinal').textContent = '$'+total.toLocaleString('es-CO');
  document.getElementById('sellBtn').disabled = cart.length===0;

  const el = document.getElementById('cartItems');
  if(!cart.length){
    el.innerHTML=`<div class="cart-empty"><i class="fas fa-shopping-bag"></i><p style="font-size:14px;font-weight:500;margin-bottom:4px">Carrito vacío</p><p style="font-size:12px">Haz clic en un producto para agregarlo</p></div>`;
    return;
  }
  el.innerHTML = cart.map(it=>`
    <div class="ci">
      <div style="flex:1;min-width:0">
        <div class="ci-name">${it.name}</div>
        <div style="font-size:11px;color:var(--gray)">$${it.price.toLocaleString('es-CO')} c/u</div>
      </div>
      <div class="ci-qty">
        <button class="qb" onclick="changeQty('${it.id}',-1)">−</button>
        <span style="font-size:14px;font-weight:600;min-width:22px;text-align:center">${it.qty}</span>
        <button class="qb" onclick="changeQty('${it.id}',1)">+</button>
      </div>
      <div class="ci-price">$${(it.price*it.qty).toLocaleString('es-CO')}</div>
      <button class="ci-del" onclick="removeFromCart('${it.id}')"><i class="fas fa-times"></i></button>
    </div>`).join('');
}

// ══════════════════════════════
// REGISTRAR VENTA
// ══════════════════════════════
async function processSale(){
  if(!cart.length) return;
  const btn = document.getElementById('sellBtn');
  btn.disabled=true;
  btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Procesando...';

  try {
    const total    = getTotal();
    const empleado = window._cajaUser?.email || 'empleado';
    const saleNum  = 'VT-'+String(Date.now()).slice(-6);

    // 1. Guardar venta en Firebase
    const {collection, addDoc, doc, updateDoc, increment, serverTimestamp} = window._fb;

    const saleData = {
      saleNum,
      empleado,
      items:    cart.map(i=>({id:i.id, name:i.name, qty:i.qty, price:i.price, subtotal:i.price*i.qty})),
      total,
      type:     'venta_local',
      status:   'completed',
      createdAt: new Date().toISOString(),
      ts:       serverTimestamp(),
    };

    await addDoc(collection(window._db,'ventas_local'), saleData);

    // 2. Descontar stock de cada producto
    for(const it of cart){
      try {
        await updateDoc(doc(window._db,'products',it.id),{
          stock: increment(-it.qty)
        });
      } catch(e){ console.warn('Stock update error:', it.name, e.message); }
    }

    // 3. Notificar por WhatsApp (silencioso, no bloquea)
    notifyVentaWA(saleData);

    // 4. Abrir caja registradora
    await openCashDrawer();

    // 5. Mostrar éxito
    document.getElementById('saleAmount').textContent = '$'+total.toLocaleString('es-CO');
    document.getElementById('saleItems').textContent  = cart.map(i=>`${i.qty}x ${i.name}`).join(' · ');
    document.getElementById('successOv').classList.add('show');

  } catch(err){
    console.error(err);
    toast('❌ Error al registrar la venta: '+err.message);
  } finally {
    btn.disabled=false;
    btn.innerHTML='<i class="fas fa-cash-register"></i> REGISTRAR VENTA';
  }
}

function closeSuccess(){
  document.getElementById('successOv').classList.remove('show');
  cart=[];
  renderCart();
}

function notifyVentaWA(sale){
  try {
    const items = (sale.items||[]).map(i=>`  • ${i.qty}x ${i.name} → $${(i.subtotal||0).toLocaleString('es-CO')}`).join('\n');

      `🏪 *VENTA EN LOCAL #${sale.saleNum}*\n\n` +
      `👤 Empleado: ${sale.empleado}\n\n` +
      `📦 Productos:\n${items}\n\n` +
      `💰 *TOTAL: $${(sale.total||0).toLocaleString('es-CO')}*\n\n` +
      `🕐 ${new Date().toLocaleString('es-CO',{dateStyle:'short',timeStyle:'short'})}`
    );
    new Image().src = `https://api.callmebot.com/whatsapp.php?phone=573126450183&text=${msg}&apikey=7131094`;
  } catch(e){ console.warn('WA notify error', e); }
}

// ══════════════════════════════════
// CAJA REGISTRADORA — Web Serial
// Señal estándar ESC/POS para abrir cajón
// ══════════════════════════════
async function openCashDrawer(){
  // Verificar soporte
  if(!('serial' in navigator)){
    toast('ℹ️ Chrome requerido para abrir la caja automáticamente');
    return;
  }
  try {
    // Si no hay puerto conectado, solicitarlo
    if(!drawerPort || !drawerPort.readable===false){
      drawerPort = await navigator.serial.requestPort();
    }
    await drawerPort.open({baudRate:9600});
    const writer = drawerPort.writable.getWriter();
    // Comando ESC/POS estándar para abrir cajón: ESC p 0 25 250
    const cmd = new Uint8Array([0x1B,0x70,0x00,0x19,0xFA]);
    await writer.write(cmd);
    writer.releaseLock();
    await drawerPort.close();
    toast('🗄️ Caja abierta');
  } catch(e){
    // Si el usuario cancela o hay error, no bloqueamos la venta
    if(e.name !== 'NotFoundError'){
      console.warn('Caja serial error:', e.message);
    }
  }
}

// ══════════════════════════════
// TOAST
// ══════════════════════════════
let toastTimer;
function toast(msg){
  clearTimeout(toastTimer);
  document.getElementById('toastTxt').textContent=msg;
  document.getElementById('toast').classList.add('show');
  toastTimer=setTimeout(()=>document.getElementById('toast').classList.remove('show'),3000);
}

renderCart();
